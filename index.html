<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dichoptic Therapy: Space Game</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="main-container" style="flex-direction: row; gap: 3rem;">
      <div class="stellar-grid"></div>
      
      <div class="canvas-wrapper">
        <div class="canvas-header">
          <div class="header-line"></div>
          <span class="header-title">Stereoscopic Therapy View</span>
          <div class="header-line"></div>
        </div>

        <!-- 
          Canvas sized to a standard aspect ratio. 
          Aria labels added for accessibility 
        -->
        <div style="position: relative;">
          <canvas id="gameCanvas" width="800" height="600" aria-label="Game Canvas for Vision Therapy" role="application"></canvas>
          <div id="startOverlay" class="start-overlay">
            <div class="overlay-content">
              <h2 class="overlay-title">Ready for Therapy</h2>
              <p class="overlay-text">Put on your Red/Cyan anaglyph glasses.</p>
              <button id="btnStart" class="theme-button overlay-button">Start Game / Audio</button>
            </div>
          </div>
        </div>
      </div>

      <aside class="settings-panel">
        <h2 class="panel-title">Clinical Config</h2>
        
        <div class="setting-group">
          <label class="setting-label">Eye Target Swap</label>
          <button id="toggleEyeSwap" class="theme-button">State A: Ship (Red) / Ast (Cyan)</button>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="redOpacity">
            Red Channel Alpha: <span id="redOpacityVal">1.0</span>
          </label>
          <input type="range" id="redOpacity" min="0" max="1" step="0.05" value="1.0" class="theme-slider">
        </div>

        <div class="setting-group">
          <label class="setting-label" for="cyanOpacity">
            Cyan Channel Alpha: <span id="cyanOpacityVal">1.0</span>
          </label>
          <input type="range" id="cyanOpacity" min="0" max="1" step="0.05" value="1.0" class="theme-slider">
        </div>

        <div class="divider"></div>

        <div class="progression-stats">
          <h3 class="panel-subtitle">Progression Stats</h3>
          <div class="stat-row">
            <span class="stat-label">Highest Score</span>
            <span id="highScore" class="stat-value">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Best Contrast Ratio</span>
            <span id="contrastRatio" class="stat-value">1.0 : 1.0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Total Session Time</span>
            <span id="sessionTime" class="stat-value">00:00</span>
          </div>
        </div>
      </aside>
    </main>
    <script type="module" src="/game.js"></script>
  </body>
</html>
